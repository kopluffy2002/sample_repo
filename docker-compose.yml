services:
  # ── 1. Database ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: schedumingle_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: chandu
      MYSQL_DATABASE: schedumingle
    ports:
      - "3306:3306" # exposed so you can connect with MySQL Workbench
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pchandu",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Backend (Express + Socket.io) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: schedumingle_backend
    restart: always
    ports:
      - "3000:3000" # exposed for direct access/debugging
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: schedumingle
      DB_USER: root
      DB_PASSWORD: chandu
      SESSION_SECRET: chandu123
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ── 3. Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: schedumingle_frontend
    restart: always
    ports:
      - "8080:80" # 👈 Open http:00000//localhost to access the app
    depends_on:
      - backend
    networks:
      - app-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  uploads:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
