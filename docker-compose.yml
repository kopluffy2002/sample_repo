services:
  # ── 1. Backend (Express + Socket.io) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: schedumingle_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: host.docker.internal # ✅ Points to your local MySQL Workbench
      DB_PORT: 3306
      DB_NAME: schedumingle
      DB_USER: root
      DB_PASSWORD: chandu
      SESSION_SECRET: chandu123
    extra_hosts:
      - "host.docker.internal:host-gateway" # ✅ Required on Windows
    volumes:
      - uploads:/app/uploads
    networks:
      - app-network

  # ── 2. Frontend (Angular + Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: schedumingle_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  uploads:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
