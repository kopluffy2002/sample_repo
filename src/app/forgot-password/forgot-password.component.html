<div class="content" role="main">
  <login-signup></login-signup> <!-- Include the 'login-signup' component here -->
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="reset-password-container">
        <form (ngSubmit)="onForgotPassword()">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="email" required class="form-control">
          </div>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" [(ngModel)]="username" required class="form-control">
          </div>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input type="password" id="new-password" name="newPassword" [(ngModel)]="newPassword" required class="form-control">
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirmPassword" [(ngModel)]="confirmPassword" required class="form-control">
          </div>
          <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
