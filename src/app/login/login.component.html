<div class="content" role="main">
  <login-signup></login-signup> <!-- Include the 'login-signup' component here -->
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="login-container">
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="email" required class="form-control">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" [(ngModel)]="password" required class="form-control">
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
          <p><a href="./forgot-password">Forgot Password?</a></p> 
        </form>
      </div>
    </div>
  </div>
</div>
