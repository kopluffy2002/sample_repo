steps:
  # ── Build Backend ────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/backend:$COMMIT_SHA
      - -f
      - Dockerfile.backend
      - .

  # ── Push Backend to Artifact Registry ────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/backend:$COMMIT_SHA

  # ── Deploy Backend to Cloud Run ───────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-backend"
    args:
      - run
      - deploy
      - schedumingle-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:us-central1:schedumingle-db
      - --set-env-vars=DB_NAME=schedumingle,DB_USER=root,DB_PASSWORD=chandu,SESSION_SECRET=chandu123,CLOUD_SQL_INSTANCE=$PROJECT_ID:us-central1:schedumingle-db

  # ── Build Frontend ───────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/frontend:$COMMIT_SHA
      - -f
      - Dockerfile.frontend
      - .

  # ── Push Frontend to Artifact Registry ───────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/frontend:$COMMIT_SHA

  # ── Deploy Frontend to Cloud Run ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-frontend"
    args:
      - run
      - deploy
      - schedumingle-frontend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/backend:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/schedumingle-repo/frontend:$COMMIT_SHA
