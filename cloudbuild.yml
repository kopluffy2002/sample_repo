steps:
  # ── Build images ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      [
        build,
        -t,
        asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/backend:$COMMIT_SHA,
        -f,
        Dockerfile.backend,
        .,
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        build,
        -t,
        asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/frontend:$COMMIT_SHA,
        -f,
        Dockerfile.frontend,
        .,
      ]

  # ── Push images ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      [
        push,
        asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/backend:$COMMIT_SHA,
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        push,
        asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/frontend:$COMMIT_SHA,
      ]

  # ── Deploy Backend ────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - schedumingle-backend
      - --image=asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=schedumingle-496211:asia-south1:YOUR_INSTANCE_NAME
      - --set-env-vars=DB_HOST=/cloudsql/schedumingle-496211:asia-south1:YOUR_INSTANCE_NAME,DB_NAME=schedumingle,DB_USER=chandu
      - --set-secrets=DB_PASSWORD=MYSQL_PASSWORD:latest,SESSION_SECRET=SESSION_SECRET:latest

  # ── Deploy Frontend ───────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - schedumingle-frontend
      - --image=asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/frontend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/backend:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/schedumingle-496211/schedumingle/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
