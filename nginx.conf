server {
    listen 8080;

    # ── Serve Angular frontend ────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API requests to backend Cloud Run service ───────────────────────
    location /api/ {
        proxy_pass https://schedumingle-backend-XXXXXXX-el.a.run.app/;
        proxy_http_version 1.1;
        proxy_set_header Host schedumingle-backend-XXXXXXX-el.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ── Proxy WebSocket (socket.io) to backend Cloud Run service ─────────────
    location /socket.io/ {
        proxy_pass https://schedumingle-backend-XXXXXXX-el.a.run.app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host schedumingle-backend-XXXXXXX-el.a.run.app;
        proxy_ssl_server_name on;
    }

    # ── /uploads/ no longer needed — files go to Cloud Storage ───────────────
    # Your server.js uploads to GCS bucket and returns a full https:// URL,
    # so the frontend uses that URL directly. No proxy needed.

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/javascript;
    gzip_min_length 1000;
}